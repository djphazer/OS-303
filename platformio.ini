[platformio]
src_dir = src
default_envs = app, bootloader

[env]
custom_project_version = 0.2-alpha

[env:app]
framework = arduino
platform = teensy
board = teensy2pp
build_flags =
  -DUSB_SERIAL
  -Wl,--section-start=.text=0x0000
build_src_filter = +<*> -<bootloader/*>
; extra_scripts = pre:progname.py

[env:bootloader]
build_src_filter = +<bootloader/*>
platform = atmelavr
platform_packages = tool-sreccat
board_build.mcu = at90usb1286
board_build.f_cpu = 16000000L
upload_protocol = teensy-cli ; usbasp          ; <-- change if using Atmel-ICE etc.
framework =
build_flags =
    -Os
    -Wl,--section-start=.text=0x1F000
    -nostartfiles
    -nostdlib
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

upload_flags = -p at90usb1286

; Flash bootloader via ISP
upload_command =
    avrdude -c usbasp -p at90usb1286
    -U flash:w:$SOURCE:i

; to merge both hex files
; srec_cat app.hex -Intel bootloader.hex -Intel -o firmware.hex -Intel
extra_scripts = post:progname.py, post:merge_firmware.py

[env:fuses]
platform = atmelavr
board_build.mcu = at90usb1286
upload_protocol = usbasp
upload_command =
    avrdude -c usbasp -p at90usb1286
    -U lfuse:w:0xDE:m
    -U hfuse:w:0xDA:m
    -U efuse:w:0xF0:m
